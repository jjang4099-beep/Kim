<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SJ 서재 — 수집 중</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: #f8f8f8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff; border-radius: 20px;
      padding: 32px 24px; max-width: 360px; width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    .title { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .sub   { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.6; }
    .url-box {
      background: #f3f4f6; border-radius: 10px;
      padding: 10px 14px; font-size: 12px; color: #374151;
      word-break: break-all; text-align: left; margin-bottom: 24px;
      max-height: 80px; overflow: hidden;
    }
    .btn-ok {
      display: block; width: 100%;
      background: #2563eb; color: #fff;
      border: none; border-radius: 12px;
      padding: 14px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-bottom: 10px;
    }
    .btn-close {
      background: none; border: none; color: #6b7280;
      font-size: 14px; cursor: pointer; padding: 8px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card" id="card">
  <!-- 로딩 상태 -->
  <div id="stateLoading">
    <div class="spinner"></div>
    <div class="title">서재에 수집 중…</div>
    <div class="sub">잠깐, AI가 분석하고 있어요</div>
  </div>

  <!-- 성공 상태 -->
  <div id="stateOk" class="hidden">
    <div class="icon">📥</div>
    <div class="title">인박스에 수집됐어요!</div>
    <div class="sub">AI가 곧 분류하여 서가에 배치합니다</div>
    <div class="url-box" id="sharedUrlBox"></div>
    <button class="btn-ok" onclick="window.location.href='/?view=mobile'">서재 열기</button>
    <button class="btn-close" onclick="window.close()">닫기</button>
  </div>

  <!-- 실패 상태 -->
  <div id="stateErr" class="hidden">
    <div class="icon">⚠️</div>
    <div class="title">수집에 실패했어요</div>
    <div class="sub" id="errMsg">잠시 후 다시 시도해 주세요.</div>
    <button class="btn-ok" onclick="window.location.href='/?view=mobile'">서재로 이동</button>
    <button class="btn-close" onclick="window.close()">닫기</button>
  </div>
</div>

<script>
(async () => {
  // URL 파라미터에서 공유 데이터 추출
  const params  = new URLSearchParams(location.search);
  const title   = params.get('title') || '';
  const text    = params.get('text')  || '';
  const url     = params.get('url')   || '';
  const content = url || text || title;

  // SW가 이미 처리했을 경우: share_ok / share_err 파라미터로 넘어옴
  if (params.get('share_ok')) {
    showOk(params.get('content') || content || '링크가 수집되었습니다.');
    return;
  }
  if (params.get('share_err')) {
    showErr(params.get('share_err'));
    return;
  }

  // SW 없이 직접 접근한 경우: 직접 POST
  if (!content) {
    showErr('공유된 콘텐츠를 찾을 수 없습니다.');
    return;
  }

  try {
    const res = await fetch('/api/inbox', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: content, source: 'share-sheet', title: title || undefined })
    });
    if (res.ok) {
      showOk(content);
    } else {
      const body = await res.json().catch(() => ({}));
      showErr(body.error || `오류 ${res.status}`);
    }
  } catch (e) {
    showErr('네트워크 오류: ' + e.message);
  }
})();

function showOk(content) {
  document.getElementById('stateLoading').classList.add('hidden');
  document.getElementById('stateOk').classList.remove('hidden');
  const box = document.getElementById('sharedUrlBox');
  if (box) box.textContent = content.slice(0, 120) + (content.length > 120 ? '…' : '');
  // 3초 후 자동 닫기 시도
  setTimeout(() => { try { window.close(); } catch {} }, 3000);
}

function showErr(msg) {
  document.getElementById('stateLoading').classList.add('hidden');
  document.getElementById('stateErr').classList.remove('hidden');
  const em = document.getElementById('errMsg');
  if (em) em.textContent = msg || '알 수 없는 오류';
}
</script>
</body>
</html>
